<VirtualHost *:80>
    ServerAdmin contact@akili.dev
    DocumentRoot /var/www/html

    # API PHP — toutes les requêtes /api/* vont vers api/index.php
    Alias /api /var/www/html/api
    <Directory /var/www/html/api>
        AllowOverride All
        Require all granted

        # Forwarder le header Authorization vers PHP (Apache le strip par défaut)
        CGIPassAuth On
        SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

        RewriteEngine On
        RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php [QSA,L]
    </Directory>

    # Frontend SPA — toutes les autres requêtes servent index.html
    <Directory /var/www/html>
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        # Ne pas réécrire les fichiers existants (assets, images)
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        # Ne pas réécrire les requêtes /api
        RewriteCond %{REQUEST_URI} !^/api
        # Tout le reste → index.html (SPA routing)
        RewriteRule ^ index.html [L]
    </Directory>

    # Headers CORS (backup si le middleware PHP ne catch pas)
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
